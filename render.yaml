# Render Blueprint — one-click deploy config
services:
  - type: web
    name: truthshield-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://truthshield-five.vercel.app,http://localhost:5173,http://localhost:3000
      - key: APP_ENV
        value: development
      - key: FRONTEND_URL
        value: https://truthshield-five.vercel.app
      - key: DATABASE_URL
        value: sqlite:///./truthshield_deploy.db
