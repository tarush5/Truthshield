# ═══════════════════════════════════════════════
# TruthShield — Docker Compose
# ═══════════════════════════════════════════════
version: "3.9"

services:
  # ── Backend API ─────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://truthshield:truthshield_pass@db:5432/truthshield
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
      - model_cache:/app/model_cache
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

  # ── Celery Worker ──────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A tasks worker --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://truthshield:truthshield_pass@db:5432/truthshield
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
      - model_cache:/app/model_cache
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

  # ── Frontend ────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── WhatsApp Bot ────────────────────────────
  whatsapp:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn integrations.whatsapp_bot:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - TRUTHSHIELD_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: truthshield
      POSTGRES_PASSWORD: truthshield_pass
      POSTGRES_DB: truthshield
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truthshield"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  model_cache:
