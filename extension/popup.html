<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TruthShield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      min-height: 200px;
      background: #0f172a;
      color: #f8fafc;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 0;
    }
    .header {
      background: linear-gradient(135deg, #1a6ff5, #06b6d4);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    .content { padding: 16px 20px; }

    .score-section {
      text-align: center;
      padding: 20px 0;
    }
    .score-ring {
      width: 100px; height: 100px;
      margin: 0 auto 12px;
      position: relative;
    }
    .score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .score-ring .bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 8; }
    .score-ring .fg { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
    .score-value {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .score-number { font-size: 28px; font-weight: 800; }
    .score-label { font-size: 10px; color: rgba(255,255,255,0.4); }

    .verdict-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .url-info {
      margin-top: 16px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      word-break: break-all;
    }

    .analyze-btn {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: linear-gradient(135deg, #1a6ff5, #3b93ff);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .analyze-btn:hover { opacity: 0.9; }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .no-result {
      text-align: center;
      padding: 30px 20px;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
    }
    .no-result .icon { font-size: 32px; margin-bottom: 8px; }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      text-align: center;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🛡️</div>
    <div>
      <h1>TruthShield</h1>
      <p>AI Misinformation Detector</p>
    </div>
  </div>

  <div class="content">
    <div id="result-section" style="display: none;">
      <div class="score-section">
        <div class="score-ring">
          <svg viewBox="0 0 100 100">
            <circle class="bg" cx="50" cy="50" r="42" />
            <circle class="fg" id="score-circle" cx="50" cy="50" r="42"
              stroke-dasharray="264" stroke-dashoffset="264" />
          </svg>
          <div class="score-value">
            <div class="score-number" id="score-number">--</div>
            <div class="score-label">/ 100</div>
          </div>
        </div>
        <div class="verdict-badge" id="verdict-badge">Loading...</div>
      </div>
      <div class="url-info" id="url-info"></div>
    </div>

    <div id="no-result" class="no-result">
      <div class="icon">🔍</div>
      <p>No analysis available for this page.</p>
      <p style="margin-top: 4px; font-size: 11px;">Click below to analyze the current page.</p>
    </div>

    <button class="analyze-btn" id="analyze-btn">🔍 Analyze This Page</button>
  </div>

  <div class="footer">
    TruthShield v1.0 — Fighting misinformation with AI
  </div>

  <script src="popup.js"></script>
</body>
</html>
